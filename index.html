<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Билеты по химии — one file</title>
  <style>
    :root {
      --blue: #2434ff;
      --paper: #f3f1ea;
      --white: #ffffff;
      --text: #14226b;
      --muted: #6d78a9;
      --line: rgba(20,34,107,.14);
      --radius: 14px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    button, input, select { font: inherit; }

    .top {
      background: var(--blue);
      color: white;
      padding: calc(16px + env(safe-area-inset-top)) 16px 18px;
    }
    .top h1 {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(40px, 11vw, 78px);
      line-height: .88;
      letter-spacing: .02em;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(255,255,255,.10);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 10px 12px 28px;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .ticket-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .ticket-no {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.04em;
    }
    .pill {
      font-size: 12px;
      color: var(--blue);
      background: rgba(36,52,255,.08);
      border: 1px solid rgba(36,52,255,.12);
      border-radius: 999px;
      padding: 7px 10px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-bottom: 0;
    }
    .controls-row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .btn, select, input {
      min-height: 46px;
      width: 100%;
      border-radius: 12px;
      padding: 0 14px;
      outline: none;
    }
    .btn {
      border: 0;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-main {
      background: var(--blue);
      color: white;
    }
    .btn-sub {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }
    select, input {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .item:last-child { margin-bottom: 0; }
    .meta {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .text {
      font-size: 15px;
      line-height: 1.45;
    }

    .task-image-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #f8f8fb;
      margin-top: 8px;
    }
    .task-image {
      display: block;
      width: 100%;
      height: auto;
    }

    details {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }
    summary {
      list-style: none;
      cursor: pointer;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 10px;
    }
    summary::-webkit-details-marker { display: none; }

    .bank-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
    }

    .toast {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: var(--blue);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: .2s ease;
      z-index: 30;
    }
    .toast.show { opacity: 1; }

    .print-ticket {
      display: none;
    }

    @media (min-width: 780px) {
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }

    @media print {
      body {
        background: white;
      }
      .top,
      .controls,
      .search-panel,
      .toast {
        display: none !important;
      }
      .wrap {
        max-width: 100%;
        padding: 0;
      }
      .panel {
        border: 0;
        padding: 0;
        margin: 0;
        background: white;
      }
      .two {
        display: none !important;
      }
      .print-ticket {
        display: block !important;
        padding: 18mm 14mm;
        color: black;
      }
      .print-ticket h1 {
        margin: 0 0 18px;
        font-size: 22px;
      }
      .print-ticket h2 {
        margin: 18px 0 8px;
        font-size: 16px;
      }
      .print-item {
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.5;
      }
    }
  </style>

  <main class="wrap">

      <div class="ticket-head">
        <div class="ticket-no" id="ticketNumber">№ 1</div>
        
      </div>

      <div class="controls">

          <option value="5">Глава 5</option>

      </div>

      <div class="print-ticket" id="printTicket"></div>
    </section>

    <div class="two">
      <section class="panel">
        
        <div id="questionCards"></div>
      </section>

      <section class="panel">
        
        <div id="taskCards"></div>
      </section>
    </div>

    <section class="panel search-panel">
      
      <div class="controls">
        <input id="searchInput" placeholder="Поиск..." oninput="renderBank()">
        <select id="bankChapterFilter" onchange="renderBank()">

          <option value="1">Глава 1</option>
          <option value="2">Глава 2</option>
          <option value="3">Глава 3</option>
          <option value="4">Глава 4</option>
          <option value="5">Глава 5</option>
        </select>
      </div>

      <details>
        <summary>Вопросы</summary>
        <div class="bank-list" id="questionBank"></div>
      </details>

      <details>
        <summary>Задачи</summary>
        <div class="bank-list" id="taskBank"></div>
      </details>
    </section>
  </main>

ационная и нейтрализационная коагуляция. Лиотропные ряды катионов и анионов"}, {"id": 67, "text": "Коагуляция золей смесью электролитов и взаимная коагуляция золей"}, {"id": 68, "text": "Коллоидная защита"}, {"id": 69, "text": "Свойства растворов ВМС по сравнению с коллоидными растворами"}, {"id": 70, "text": "Специфические свойства ВМС"}, {"id": 71, "text": "Вязкость жидкостей. Динамическая вязкость. Закон Пуазёйля. Зависимость динамической вязкости от объемной доли дисперсной фазы. Закон Эйнштейна"}, {"id": 72, "text": "Аномальная вязкость растворов ВМС"}, {"id": 73, "text": "Удельная, относительная, приведенная и характеристическая вязкость растворов ВМС. Уравнения Штаудингера, Марка-Куна-Хаувинка и уравнение Хаггинса"}, {"id": 74, "text": "Оптические явления в дисперсных системах. Дифракционное рассеивание света. Эффект Фарадея-Тиндаля"}, {"id": 75, "text": "Оптические методы исследования коллоидных систем"}, {"id": 76, "text": "Молекулярно-кинетические свойства коллоидных растворов. Броуновское движение. Диффузия. Осмос. Седиментация"}, {"id": 77, "text": "Солюбилизация"}];
    const tasks = [{"section": 1, "id": 1, "text": "Найти работу изобарного расширения аргона от 2 до 3 л под давлением 30 Па."}, {"section": 1, "id": 2, "text": "Найти работу, полученную при изотермическом расширении 100 г азота при изменении давления от 3⋅105 до 2⋅105 Па при температуре 70°С."}, {"section": 1, "id": 3, "text": "л кислорода, взятого при нормальных условиях, нагревают до 200°С при постоянном объеме. Определить количество теплоты, затраченное на нагревание."}, {"section": 1, "id": 4, "text": "кг неона нагреваются при постоянном давлении. Найти изменение энтальпии, если температура повысилась на 100°С."}, {"section": 1, "id": 5, "text": "Рассчитайте изменение внутренней энергии гелия (одноатомного идеального газа) при изобарном расширении от 5 до 10 л под давлением 196 кПа. 6.10 кг водорода, взятого при Р 1 = 1.013⋅105 Па и Т = 3 00К, сжимают изотермически до объема 1 м 3. Определите теплоту процесса и конечное давление в системе."}, {"section": 1, "id": 7, "text": "Какая работа будет совершена, если 112 г аммиака, занимавшего при 27°С объем 50 л, расширяются при постоянной температуре до объема 150 л."}, {"section": 1, "id": 8, "text": "Найти изменение внутренней энергии при испарении 10 г ацетона при температуре его кипения, если удельная теплота парообразования ацетона 450.2 Дж/г, удельный объем пара 500 см 3/г (объемом жидкости пренебречь), давление 101325 Па."}, {"section": 1, "id": 9, "text": "Определить изменение внутренней энергии при испарении 115 г толуола при 40°С, приняв, что пары толуола подчиняются законам идеальных 15 газов и объем жидкости незначителен по сравнению с объемом пара. Удельная теплота испарения толуола 347.8 Дж/г."}, {"section": 1, "id": 10, "text": "Вычислите стандартную энтальпию образов ания хлорида фосфора (V) по следующим значениям энтальпий реакции: P4(белый) + 6Cl2(г) ⇄ 4PCl3(г) ∆Н1 0 = −1224 кДж/моль PCl3(г) + Cl2(г) ⇄ PCl5(г) ∆Н2 0 = −93 кДж/моль"}, {"section": 1, "id": 11, "text": "Стандартная теплота сгорания метана равна –890.3 кДж/моль. Определите стандартн ую теплоту образования метана, если стандартные теплоты образования углекислого газа и жидкой воды равны –393.5 и –285.8 кДж/моль соответственно."}, {"section": 1, "id": 12, "text": "Определите теплоту сгорания этилена: C2H4(г) + 3O2(г) = 2CO2(г) + 2H2O(ж) + Q исходя из следующих данных: 2C(графит) + 2H2(г) = C2H4(г) – 62 кДж/моль C(графит) + O2(г) = CO2(г) + 394 кДж/моль H2(г) + 1/2O2(г) = H2O(ж) + 285 кДж/моль"}, {"section": 1, "id": 13, "text": "Определите теплоту сгорания спирта: C2H5OH(ж)+ 3O2(г) = 2CO2(г) + 3H2O(ж) + Q исходя из следующих данных: С(графит) + O2(г) = CO2(г) + 393.5 кДж/моль H2(г) + 1/2O2(г) = H2O(ж) + 285 кДж/моль 2C(графит) + 3H2(г) + 1/2O2(г) = C2H5OH(ж) + 278.2 кДж/моль"}, {"section": 1, "id": 14, "text": "Рассчитайте энтальпию образования сульфата цинка из простых веществ при Т = 298К на основании следующих данных: ZnS = Zn + S ∆Н1 0 = 200.5 кДж/моль 2ZnS + 3O2 = 2ZnO + 2SO2 ∆Н2 0 = −893.5 кДж/моль 2SO2 + O2 = 2SO3 ∆Н3 0 = −198.2 кДж/моль ZnSO4 = ZnO + SO3 ∆Н4 0 = 235 кДж/моль"}, {"section": 1, "id": 15, "text": "Рассчитайте энтальпию образования N 2O5(г) при T = 298К на основании следующих данных: 2NO(г) + O2(г) = 2NO2(г) ∆Н1 0 = −114.2 кДж/моль 4NO2(г) + O2(г) = 2N2O5(г) ∆Н2 0 = −110.2 кДж/моль N2(г) + O2(г) = 2NO(г) ∆Н3 0 = 182.6 кДж/моль"}, {"section": 1, "id": 16, "text": "Рассчитайте тепловой эффект реакции: NH3 + 5/4O2 = NO + 3/2 H2O(г) при T = 298 K, если известны следующие данные: H2O(г) = H2O(ж) ∆Н1 0 = −44 кДж/моль 1/2N2 + 3/2H2 = NH3 ∆Н2 0 = −46.2 кДж/моль H2 + 1/2O2 = H2O(ж) ∆Н3 0 = −285.8 кДж/моль NO = 1/2N2 + 1/2O2 ∆Н4 0 = 91.3 кДж/моль"}, {"section": 1, "id": 17, "text": "Рассчитайте по справочным данным энтальпию реакции получения мочевины из аммиака и оксида углерода (IV) при 298К по реакции: 2NH3(г) + CO2(г) = CO(NH2)2(тв) + H2O(г) воспользовавшись первым следствием из закона Гесса."}, {"section": 1, "id": 18, "text": "Вычислите стандартную энтальпию реакции: 2CH3Cl(г) + 3O2(г) = 2CO2(г) + 2H2O(ж) + 2HCl(г) используя табличные значения стандартных энтальпий образования веществ."}, {"section": 1, "id": 19, "text": "Вычислите двумя способами (с использованием стандартных энтальпий образования и стандартных энтальпий сгорания) стандартную энтальпию гидрирования бензола (ж) до циклогексана (ж)."}, {"section": 1, "id": 20, "text": "Вычисл ите двумя способами (с использованием стандартных энтальпий образования и стандартных энтальпий сгорания) стандартную энтальпию реакции каталитического окисления метана (г) до метанола (ж)."}, {"section": 1, "id": 21, "text": "Вычислите количество теплоты, которое выделится/поглотится, если в реакцию 4 KClO3(тв) = KCl(тв) + 3 KClO4(тв) вступает 3 г KClO 3. Запишите термохимическое уравнение данной реакции."}, {"section": 1, "id": 22, "text": "В организме человека в результате метаболизма образуется глицерин, который далее превращается в СО 2(г) и Н 2О(ж). Пользуясь справочными данными энтальпий образования, определите, какое количество теплоты выделяется при окислении 1 г глицерина."}, {"section": 1, "id": 23, "text": "Какое количество теплоты выделится при сжигании 112 л (н.у.) метана согласно уравнению CH4(г) + 2O2(г) = CO2(г) + 2H2O(г)? Воспользоваться вторым следствием из закона Гесса."}, {"section": 1, "id": 24, "text": "Используя второе следствие из закона Гесса, рассчитайте, какое количество теплоты выделится при восстановлении 25 г уксусной кислоты по уравнению CH3COOH(ж) + 3H2(г) = C2H6(г) + 2H2O(ж)."}, {"section": 1, "id": 25, "text": "Теплота разложения карбоната кальция по реакции: CaCO3(тв) = CaO(тв) + CO2(г) при 900 °С равна 178.0 кДж/моль. Определите количество теплоты, выделяемое при разложении 1 кг карбоната кальция."}, {"section": 1, "id": 26, "text": "Используя второе следствие закона Гесса рассчитайте, какое количество теплоты выделится/поглотится по реакции: 2CH4(г) + CO2(г) = CH3COCH3(г) + H2O(г) если при этом получено 45 л (н.у.) ацетона."}, {"section": 1, "id": 27, "text": "Рассчитайте ∆rH0 двумя способами для реакции: C2H2(г) + 2H2(г) → C2H6(г) К какому типу, экзо- или эндотермическим, относится данная реакция?"}, {"section": 1, "id": 28, "text": "Какая масса глюкозы вступает в реакцию: C6H12O6(тв) + 6O2(г) → 6CO2(г) + 6H2O(ж) если известно, что выделилось 1200 кДж тепла? Воспользуйтесь вторым следствием закона Гесса."}, {"section": 1, "id": 29, "text": "Рассчитайте тепловой эффект реакции спиртового брожения 54 г глюкозы, протекающей по уравнению: C6H12O6(тв) → 2CO2(г) + 2С2H5OH(ж) исходя из стандартных энтальпий сгорания веществ."}, {"section": 2, "id": 1, "text": "Для всех указанных реакций при 298К: С2H5OH(ж) + 3O2(г) = 2CO2(г) + 3H2O(ж) С6H12O6(тв) + 6O2(г) = 6CO2(г) + 6H2O(ж) CaCO3(тв) = CaO(тв) + CO2(г) Fe3O4(тв) + H2(г) = 3FeO(тв) + H2O(ж) 2KNO3(тв) + H2SO4(ж) = K2SO4(тв) + 2HNO3(г) а) Рассчитать изменение энтропии (ΔrS0); б) Рассчитать изменение энергии Гиббса ( ΔrG0) двумя способами (по табличным данным и по уравнению Гиббса-Гельмгольца); в) Рассчитать константу равновесия; г) Рассчитать стандартное химическое сродство."}, {"section": 2, "id": 2, "text": "Рассчитайте двумя способами стандартную энергию Гиббса (при 298К) реакции: 2CO(г) + SO2(г) → 1/2S2(г) + 2CO2(г) Оцените роль энтальпийного и энтропийного факторов в самопроизвольности протекания реакции. В какую сторону сместится равновесие повышении давления?"}, {"section": 2, "id": 3, "text": "В реакции А +2В ⇄ С равновесные концентрации равны: [A] = 0.06 М, [B] = 0.12 М и [C] = 0.216 М. Найти константу равновесия и исходные концентрации веществ А и В."}, {"section": 2, "id": 4, "text": "В реакци ю 2А +В ⇄ 2С вступило 1.8 моль вещества А и 1 моль вещества В. Определить константу равновесия, если при достижении равновесия образовалось 1.2 моль вещества С."}, {"section": 2, "id": 5, "text": "Через некоторое время после начала реакции 3А + В ⇄ 2С + D концентрации веществ составляли: [A] = 0.03 М, [B] = 0.01 М, [C] = 0.008 М. Каковы исходные концентрации веществ А и В?"}, {"section": 2, "id": 6, "text": "В каком направлении будет смещаться равновесие реакции А + В 2 ⇄ АВ2 при уменьшении объема в 4 раза?"}, {"section": 2, "id": 7, "text": "В состоянии равновесия реакции N 2 + 3H 2 ⇄ 2NH3 концентрации участвующих веществ были: [N 2] = 0.3 M, [H 2] = 0.9 M, [NH 3] = 0.4 M. Определить константу равновесия. Как изменится константа равновесия, если давление увеличить в 5 раз?"}, {"section": 2, "id": 8, "text": "Если в закрытом сосуде нагреть до 445 °С 8 моль I2 и 5.3 моль Н2, то при достижении ра вновесия образуется 9.5 мол ь HI. Определить константу равновесия."}, {"section": 2, "id": 9, "text": "Процесс получения хлора окислением хлороводорода протекает по схеме: 4HCl + O2 ⇄ 2H2O + 2Cl2. В момент равновесия концентрации HCl, О2 и Cl 2 составляли 1, 0.48 и 0.402 М. Определить конст анту равновесия и исходные концентрации HCl и О2."}, {"section": 2, "id": 10, "text": "При синтезе фосгена CO + Cl 2 ⇄ COCl2 равновесные концентрации реагирующих веществ были: [CO] = 0.2 М, [Cl 2] = 0.1 М, [COCl 2] = 2 М. Определить константу равновесия и исходные концентрации СО и Cl2."}, {"section": 2, "id": 11, "text": "В реакции СН 3СООН + С 2Н5ОН ⇄ СН3СООС2Н5 + Н 2О при достижении равновесия в реакционной смеси находилось по 0.5 моль кислоты и спирта и по 0.7 моль эфира и воды. Определить константу равновесия и исходные концентрации уксусной кислоты и этилового спирта."}, {"section": 2, "id": 12, "text": "Если нагреть 1492 г йода и 32.4 г водорода в закрытом сосуде емкостью 2 л до 693К, то при достижении равновесия образуется 1442 г йодистого водорода. Вычислить константу равновесия данной реакции при указанной температуре."}, {"section": 2, "id": 13, "text": "В реакцию 2NO2 ⇄ 2NO + O2 вступает 1.5 М NO2. Равновесие устанавливается при концентрации NO 1.2 М и O2 0.6 М. Вычислить константу равновесия данной реакции."}, {"section": 2, "id": 14, "text": "В реакцию 3Fe + 4H 2O ⇄ Fe3O4 + 4H2 вступает 5 М Fe и 3 М H 2O. Равновесие устанавливается при концентрации Fe 3O4 1.5 М и Н 2 – 2.5 М. Вычислить константу равновесия данной реакции."}, {"section": 2, "id": 15, "text": "При нагревании водорода и йода в замкнутом сосуде до 444 °С протекает реакция: H2(г) + I2(г) ⇄ 2HI(г). Равновесная смесь при этой температуре состояла из 5.64 моль йодоводорода, 0.12 моль йода и 5 .28 моль водорода. Вычислить константу равновесия указанной реакции при 444 °С и определить исходные концентрации водорода и йода."}, {"section": 2, "id": 16, "text": "При нагревании смеси углекислого газа и водорода в закрытом сосуде устанавливается равновесие CO2(г) + H2(г) ⇄ CO(г) + H2O(г). Константа равновесия при 850 °С равна 1. Определить равновесные концентрации всех веществ, если начальная концентрация CO2 – 0.01 моль/л, Н2 – 0.05 моль/л."}, {"section": 2, "id": 17, "text": "Для реакции N2O4(г) ⇄ 2NO2(г) при 298К рассчитайте стандартное химическое сродство веществ и константу равновесия. Сделайте вывод о возможности протекания реакции. Как влияют изменение давления и температуры на положение равновесия в этой системе?"}, {"section": 2, "id": 18, "text": "Для реакции COCl2(г) ⇄ CO(г) + Cl2(г) константы равновесия при 127°С 33400, а при 227 °С 1520. Вы числите энтальпию этой реакции в указанном интервале температур."}, {"section": 2, "id": 19, "text": "Для реакции 3H2(г) + N2(г) ⇄ 2NH3(г) константа равновесия при 620°С равна 7.3∙106 и при 720°С – 2.16∙106. Определить тепловой эффект реакции в данном температурном интервале и константу равновесия при 680°С."}, {"section": 2, "id": 20, "text": "Константа равновесия КС реакции COCl2(г) ⇄ CO(г) + Cl2(г) при 600°С равна 6.386. В каком направлении будет протекать реакции при следующих концентрациях реагирующих веществ: СО – 0.75 моль/л, Сl 2 – 0.75 моль/л, СОСl2 – 3.25 моль/л."}, {"section": 2, "id": 21, "text": "Константа равновесия К Р реакции PCl3(г) + Cl2(г) ⇄ PCl5(г) при 500К равна 2 .962·10–5. В каком направлении будет протекать реакция, если парциальные давления соответственно равны: р (PCl5) = 101325 Н/м2, р (PCl3) = 50662.5 Н/м2, р (Cl2) = 202650 Н/м2?"}, {"section": 2, "id": 22, "text": "При 300К константа равновесия реакции трансаминирования: L-глутаминовая кислота + пировиноградная кислота = 2- оксоглутаровая кислота + L-аланин 27 равна 1. В каком направлении будет идти реакция при следующих концентрациях: L -глутаминовая кислота и пирува т по 0.00003 моль/л; 2-оксоглутаровая кислота и L-аланин по 0.005 моль/л."}, {"section": 2, "id": 23, "text": "Константа равновесия реакции N 2O4(г) ⇄ 2NO2(г) при 25 °С равна 4.64·10–3. В каком направлении будет идти реакция при следующих концентрациях веществ: а) С(NO2) = 0.05 моль/л; С(N2O4) = 0.003 моль/л; б) С(NО2) = 0.003 моль/л; С(N2O4) = 0.05 моль/л; в) С(NO2) = 0.0107 моль/л; С(N2O4) = 0.246 моль/л; г) С(NO2) = 0.0095 моль/л; С(N2O4) = 0.046 моль/л."}, {"section": 2, "id": 24, "text": "Константа равновесия реакции этерификации, протекающей между этанолом и уксусной кислотой, при 25°С равна 4. В каком направлении будет идти реакция при следующих концентрациях веществ: а) С (H2O) = С ( CH3COOC2H5) = 2 моль/л; С ( CH3COOH) = 1 моль/л; С (C2H5OH) = 0.05 моль/л; б) С (H2O) = С (CH3COOC2H5) = С (CH3COOH) = 2 моль/л; С (C2H5OH) = 4 моль/л."}, {"section": 2, "id": 25, "text": "Константа равновесия К реакции I2 ⇄ 2I при 677°С равна 1.149·102, а при 777°С – 7.413·102. Вычислить константу равновесия указанной реакции при 727°С."}, {"section": 2, "id": 26, "text": "Для реакции H2(г) + I2(г) ⇄ 2HI(г) при 444°С константа равновесия К ="}, {"section": 2, "id": 50, "text": "Определить направление реакции при этой температуре."}, {"section": 2, "id": 27, "text": "Для реакции N 2O4(г) ⇄ 2NO2(г) константа равновесия при 0 °С равна 1.56·103, а при 18.3°С – 7.35·103. Вычислить константу этой реакции при 25°С."}, {"section": 2, "id": 28, "text": "Для реакции 2SO2(г) + O2(г) ⇄ 2SO3(г) константа равновесия при 900К равна 0.043·10–2, а при 950К – 1.062·10–2. Определить константу равновесия этой реакции при 930К."}, {"section": 2, "id": 29, "text": "Для реакции СО(г) + Н2О(г) ⇄ СО2(г) + Н2(г) константа равновесия при 1000К равна 1.36, а при 1200К – 0.68. Определить тепловой эффект реакции и константу равновесия при 1100°С."}, {"section": 2, "id": 30, "text": "Вычислить константу равновесия реакции 2Н2(г) + О2(г) ⇄ 2Н2О(г) при 1278°С, если при 1227 °С К = 2.6·10 11, а ΔН = – 484 кДж/моль. Определить энергию Гиббса этой реакции при температуре 1227°С."}, {"section": 2, "id": 31, "text": "Для реакции N2(г) + 3H2(г) ⇄ 2NH3(г) константа равновесия при 893К равна 7.3·106 и при 973К – 2.16·106. Определить тепловой эффект реакции и константу равновесия при 933К."}, {"section": 2, "id": 32, "text": "Вычислить константу равновесия при 25 °С для реакции 2H2S(г) + SO2(г) ⇄ 2H2O(г) + 3S(тв) , если ΔG° = – 108,18 кДж/моль."}, {"section": 2, "id": 33, "text": "Для реакции PCl3(г) + Cl2(г) ⇄ PCl5(г) при 500К константа равновесия равна 2.962·10–5. Определить значение энергии Гиббса для этой реакции."}, {"section": 2, "id": 34, "text": "Определить значение энергии Гиббса для реакции 2Fe(тв) + O2(г) ⇄ 2FeO(тв) при температуре 1000К, если константа равновесия равна 2.42·1015."}, {"section": 2, "id": 35, "text": "Определить значение энергии Гиббса для реакции SO2(г) + Cl2(г) ⇄ SO2Cl2(г), если при 191°С константа равновесия равна 7.5·10–7."}, {"section": 2, "id": 36, "text": "Вычислить константу равновесия для реакции СО(г) + 2Н2(г) ⇄ СН3ОН(г) при 500К, если при 400К константа равновесия равна 3.9·10–11. ΔН = – 113,13 кДж/моль."}, {"section": 2, "id": 37, "text": "Вычислить ко нстанту равновесия при 227 °С для реакции Cl2(г) + H2(г) ⇄ 2HCl(г), если ΔG = – 19280 Дж/моль."}, {"section": 2, "id": 38, "text": "Определить значение энергии Гиббса для реакции CaO(тв) + CO2(г) ⇄ CaCO3(тв) при температуре 1130К, если константа равновесия равна 0.56·105."}, {"section": 2, "id": 39, "text": "Определить значение энергии Гиббса для реакции Al 2O3(тв) + 3SO3(г) ⇄ Al2(SO4)3(тв) при температуре 25°С если константа равновесия равна 7.4·1055."}, {"section": 3, "id": 1, "text": "Определите температуры кипения и замерзания раствора, содержащего 1 г нитробензола С 6Н5NО2 в 10 г бензола. Криоскопическая константа бензола – 5.07 К∙кг/моль, температура замерзания бензола равна 5.45°С. Эбулиоскопическая константа бензола – 2.57 К∙кг/моль, температура кипения равна 80.2°С."}, {"section": 3, "id": 2, "text": "Определите температуру кипения и замерзания 2% -ного раствора глюкозы."}, {"section": 3, "id": 3, "text": "Вычислите температуру замерзания раствора, полученного растворением 25 г этанола в 900 мл воды."}, {"section": 3, "id": 4, "text": "Вычислите массу рибозы (С5Н10О5), которую следует растворить в 150 г воды, чтобы получить раствор, кипящий при 100.1°С."}, {"section": 3, "id": 5, "text": "Какую массу сахарозы следует взять для приготовления 1.3 л водного раствора, изотоничного плазме крови при t = 37°С (Росм плазмы крови при 37°С составляет 740–780 кПа)?"}, {"section": 3, "id": 6, "text": "Раствор 1.05 г неэлектролита в 30 г воды замерзает при –0.7°С. Вычислите молекулярную массу неэлектролита. Криоскопическая константа воды 1.86 К∙кг/моль."}, {"section": 3, "id": 7, "text": "Рассчитайте молярную массу неэлектролита, если температура замерзания раствора, содержащего 5 г вещества в 500 г воды, равна –0.102°С. Криоскопическая константа воды 1.86 К∙кг/моль."}, {"section": 3, "id": 8, "text": "Рассчитайте молярную массу неэлектролита, если его массовая доля в водном растворе 1.96% и кристаллизация происходит при –0.248°С. Криоскопическая константа воды 1.86 К∙кг/моль."}, {"section": 3, "id": 9, "text": "Вычи слите молекулярную массу неэлектролита, если известно, что температура кипения раствора, содержащего 1 г этого вещества в 20 г диоксана, равна 101.9 °С. Эбулиоскопическая константа диоксана 3.2 К∙кг/моль."}, {"section": 3, "id": 10, "text": "Осмотическое давление водного раствора гемоглобина, содержащего 3.2 г гемоглобина в 100 мл раствора при 17 °С, равно 4.373 кПа. Определите молярную массу гемоглобина."}, {"section": 3, "id": 11, "text": "Вычислите осмотическое давление 5% -ного раствора глюкозы при 37°С, используемого для восполнения потерь воды при обезвоживании организма и в качестве продукта, дающего человеку энергию. Плотность раствора считать примерно равной 1 г/мл. Определите, является ли этот раствор изотоническим, гипотоническим или гипертоническим по отношению к плазме крови, осмотическое давление которой равно 740–780 кПа."}, {"section": 3, "id": 12, "text": "Рассчитайте осмотическое давление 17%-ного раствора сахарозы (ρ = 1.067 г/см3). Каким является этот раствор (изо-, гипо- или гипертоническим) 47 по отношению к растворам (при 37 °С) имеющим значение осмотического давления: а) 780 кПа, б) 730 кПа; в) 258 кПа; г) 3091 кПа; д) 1472 кПа?"}, {"section": 3, "id": 13, "text": "При увеличении дефицита воды в зоне обитания животных имеется тенденция к уменьшению объема выделяемой мочи и увеличению ее концентрации. Осмомолярность мочи бобра равна 0.6 осмоль/л, а тушканчика – 9 осмоль/л. Вычислите соответствующие значения осмотического давления. Температуру условно принять равной 25°С."}, {"section": 3, "id": 14, "text": "Морская вода, содержащая 2.5% солей по массе, замерзает при –1.332°С. Вычислите осмомоляльность такой морской воды."}, {"section": 3, "id": 15, "text": "Вычислите осмотическое давление раствора, содержащего 16 г сахарозы С12Н22О11 в 350 г воды при 293К. Плотность раствора считать равной 1 г/мл."}, {"section": 3, "id": 16, "text": "Вычислите температуру кипения, замерзания и осмотическое давление при 25 °С водного раствора соляной кислоты (ω = 6.4%). Изотонический коэффициент этого раствора равен 1.66, криоскопическая константа воды 1.86 К∙кг/моль, эбулиоскопическая константа воды 0.52 К∙кг/моль. Плотность раствора 1.030 г/мл."}, {"section": 3, "id": 17, "text": "Рассчитайте осмотическое давление 10%-го раствора хлорида натрия (ρ = 1.071 г/мл, i = 1.87) и определите, каким он будет по отношению к плазме крови (t = 37°С)."}, {"section": 3, "id": 18, "text": "Вычислите температуру кипения и замерзания 5% -ного раствора серной кислоты. Степень диссоциации кислоты в растворе равна 68%."}, {"section": 3, "id": 19, "text": "Раствор, содержащий 8 г NaOH в 1000 г Н2О, кипит при 100.184°С. Определите изотонический коэффициент и степень диссоциации."}, {"section": 3, "id": 20, "text": "Вычислите температуру замерзания водного раствора соляной кислоты (ω = 6.8%). Изотонический коэффициент для этого раствора равен 1.56."}, {"section": 3, "id": 21, "text": "Вычислите температуру кип ения и замерзания 0.9% -ного раствора NaCl если i = 1.95."}, {"section": 3, "id": 22, "text": "Определите температуру замерзания и температуру кипения раствора хлорида калия с массовой долей 0.9%, если кажущаяся степень диссоциации КCl в этом растворе равна 86.3%."}, {"section": 3, "id": 23, "text": "г нитрата бария рас творили в 400 г воды. Вычислите температуру кипения и замерзания данного раствора, если кажущаяся степень диссоциации нитрата бария в нем равна 79%."}, {"section": 3, "id": 24, "text": "Раствор, содержащий 0.85 г хлорида цинка в 125 г воды, кристаллизуется при –0.23°С. Рассчитайте кажущую ся степень диссоциации хлорида цинка в данном растворе."}, {"section": 3, "id": 25, "text": "При растворении 19.46 г сульфата натрия в 100 г воды температура кипения воды повысилась на 1.34 °С. Определите кажущуюся степень диссоциации соли в растворе."}, {"section": 3, "id": 26, "text": "Установите, каким (изо -, гипо - или гипертоническим) является раствор хлорида калия с молярной концентрацией 0.01 моль/л (изотонический коэффициент 1.96) по отношению к плазме крови при 37°С."}, {"section": 3, "id": 27, "text": "Рассчитайте осмотическое давление раствора, содержащего 12 г хлорида железа (III) в 500 мл раст вора, при 37 °С? Примите степень 48 диссоциации соли 85%. Каким будет этот раствор по отношению к плазме крови?"}, {"section": 3, "id": 28, "text": "В 250 мл раствора содержится 1.86 г хлорида калия. При 10 °С осмотическое давление этого раствора равно 437 кПа. Чему равен изотонический коэффициент хлорида калия в данном растворе?"}, {"section": 3, "id": 29, "text": "Вычислить давление пара над 23% -ным раствором этиленгликоля при 50°С, если давление над водой при той же температуре равно 12320 Па."}, {"section": 3, "id": 30, "text": "Определить давление пара раствора при 40°С, содержащего глюкозу массой 3.6 г в воде массой 250 г. Давление пара воды при той же температуре равно 7374 Па."}, {"section": 3, "id": 31, "text": "Чему равно давление паров воды над раствором, содержащим 7.2 г глюкозы в 180 г воды при 25 °С? Давление паров воды при этой температуре составляет 3.17 кПа."}, {"section": 3, "id": 32, "text": "Определите относительное понижение давления пара над раствором, содержащим салициловую кислоту (С7Н6О3) массой 4.14 г в этиловом спирте массой 100 г при температуре 30°С. Давление пара воды при 50°С равно 12330 Па. Сколько граммов глюкозы нужно растворить в воде массой 270 г, чтобы давление пара над раствором понизилось на 70 Па?"}, {"section": 3, "id": 33, "text": "Бензол и дихлорэтан образуют смеси, подчиняющиеся закону Рауля. При 40°С давления пара бензола и дихлорэтана соответственно равны 241.3 и 202.6 гПа. Вычислите при этой температуре парциальн ое давление насыщенных паров каждого компонента и общее давление смеси, содержащей: 1) 0.2 мольные доли бензола; 2) бензол массой 500 г и дихлорэтан массой 500 г."}, {"section": 3, "id": 34, "text": "При 100°С тетрахлорэтилен имеет давление насыщенного пара 400 мм. рт. ст., а бромбензол – 196 мм. рт. ст. Найти состав раствора, кипящего при 100°С под давлением 360 мм. рт. ст., и состав насыщенного пара над раствором. Считать раствор идеальным."}, {"section": 3, "id": 35, "text": "При 60 °С давление пара бензола и толуола соответственно равны 518.6 и 196.0 гПа. Смесь этих ве ществ практически идеальна. Вычислить ее состав в молярных долях (%), если общее давление равновесного с ней пара равно 333 гПа. Каков состав пара над этой смесью?"}, {"section": 3, "id": 36, "text": "Закрытый сосуд объемом 5.0 л содержит газ Н 2S при температуре 20°С и давлении равном 740 мм. рт. ст. Какой объем воды должен быть добавлен, чтобы парциальное давление Н 2S понизилось до 500 мм. рт. ст.? Коэффициент абсорбции Н2S (α) равен 2.58."}, {"section": 3, "id": 37, "text": "При 18°С удельная электропроводность 5% раствора Mg(NO3)2 равна 4.38·10–2 См/см, плотность раствора 1.038 г/мл. Вычислите значение эквивалентной электропроводности раствора и кажущейся степени диссоциации соли в растворе. Подвижности ионов Mg 2+ и NO 3– при 18 °С равны 44.6 и 62.6 См∙см2/моль-экв, соответственно."}, {"section": 3, "id": 38, "text": "При 22°С удельная электропроводность 9.55% раствора муравьиной кислоты, равна 7.56∙10–3 Ом–1∙см–1. Плотность раствора составляет 1.024 г/мл. Константа диссоциации муравьиной кислоты 1.7 8∙10–4. Вычислить значение эквивалентной электропроводности при бесконечном разведении."}, {"section": 3, "id": 39, "text": "Удельная электропроводность 0.195 моль/л раствора пропионовой кислоты C 2H5COOH равна 4.79·10 –4 См·см–1. Рассчитайте эквивалентную электропроводность раствора и константу диссоциации раствора если предельные подвижности H + и C 2H5COO– равны 349.8 См· см2·моль-экв–1 и 37.2 См·см2·моль-экв–1, соответственно."}, {"section": 3, "id": 40, "text": "Константа диссоциации масляной кислоты C 3H7COOH равна 1.35·10–5. Эквивалентная электропроводность раствора с массовой долей 0.86% (плотность раствора равна 1 г/мл) равна 4.13 См·см 2·моль-экв–1. Рассчитать степень диссоциации кислоты и концентрацию ионов водорода в этом растворе, а также эквивалентную электропроводность раствора при бесконечном разведении."}, {"section": 3, "id": 41, "text": "Константа диссоциации масляной кислоты C 3H7COOH равна 1.50·10–5. Эквивалентная электро проводность раствора при разведении 1024 л·моль–1 равна 41.3 см·см 2·моль-экв–1. Рассчитать степень диссоциации кислоты и концентрацию ионов водорода в этом растворе, а также эквивалентную электропроводность раствора при бесконечном разведении."}, {"section": 3, "id": 42, "text": "Установл ено, что удельная электрическая проводимость мочи человека при заболевании почек изменяется от 1.08 См∙м –1 до 1.12 См∙м –1, а соотношение молярных электрических проводимостей λ1/λ2 = 0.6. Определите, во сколько раз изменяется концентрация минеральных солей в моче при таком заболевании."}, {"section": 3, "id": 43, "text": "При 18 °С удельная электропроводность 5% -го раствора Mg(NO 3)2 равна 4.38∙10 –2 Ом–1∙см–1, плотность его 1.038 г/мл. Вычислить значения эквивалентной электропроводности раствора и кажущейся степени диссоциации соли в растворе . Подвижности ионов Mg 2+ и NO 3– при 18 °С равны 44.6 и 62.6 Ом–1∙см2∙моль-экв–1 соответственно."}, {"section": 3, "id": 44, "text": "Удельная электропроводность 10%-го раствора CaCl2 при 18°С равна 11.4∙10–2 Ом–1∙см–1, плотность 1.08 г/мл. Вычислить эквивалентную электропроводность и кажущуюся степень электролитической диссоциации CaCl2 в растворе. Подвижности ионов Ca2+ и Cl– при 18°С равны 50.40 и 66.36 Ом–1∙см2∙моль-экв–1 соответственно."}, {"section": 3, "id": 45, "text": "В 1 литре культуральной жидкости содержится 0.3 г пенициллина. Для экстракции берут 500 мл а милацетата. В каком случае извлечение будет более полным, если экстрагировать: а) 1 раз 500 мл амилацетата; б) 5 раз порциями по 100 мл амилацетата. Коэффициент распределения между органическим и водным слоем равен 25."}, {"section": 3, "id": 46, "text": "При распределении янтарной кислот ы между водой и эфиром были получены следующие данные: концентрация кислоты (моль/дм 3) в водном растворе 0.121 и 0.070, в эфире соответственно 0.2200 и 0.0128. Показать, что для янтарной кислоты и данных растворителей справедлив закон распределения в его простейшей форме."}, {"section": 3, "id": 47, "text": "Сколько нужно провести экстракций, чтобы извлечь йод на 99% из 4 дм3 водного раствора концентрацией 0.1 г/дм 3, если йод экстрагируется порциями сероуглерода по 100 мл. Величина К = 59."}, {"section": 3, "id": 48, "text": "Коэффициент распределения уксусной кислоты меж ду амиловым спиртом и водой равен 0.914. Сколько воды потребуется для извлечения уксусной кислоты из 2 л 0.2 М раствора уксусной кислоты в амиловом спирте, если ее концентрация в водном растворе должна быть 0.1 моль/л?"}, {"section": 3, "id": 49, "text": "В 5 л водного раствора находится 0.04 г йода. Какое количество йода останется в водном растворе после экстракции его 50 мл сероуглерода: а) если экстракцию проводить однократно всем количеством CS2; б) если экстракцию проводить пятикратно порциями по 10 мл CS 2? Коэффициент распределения йода для системы H2O/CS2 составляет 1.67·10–3."}, {"section": 3, "id": 50, "text": "г синтезированного органического вещества растворено в 1 дм 3 воды. Вычислите массу этого соединения, экстрагируемую 50 см 3 эфира за один раз, и за два раза, но по 25 см 3. Коэффициент распределения веществ а между эфиром и водой при комнатной температуре равен 40.0."}, {"section": 3, "id": 51, "text": "Коэффициент распределения вещества А между эфиром и водой равен 5.0. Раствор содержащий 10.0 г А в 500 мл воды обрабатывают 100 мл эфира. Какое из перечисленных значений: 2.5, 5.0, 7.5 или 12 .5 г – соответствует массе вещества А, экстрагированной из воды."}, {"section": 3, "id": 52, "text": "Равновесная концентрация брома в воде составляет 0.052 моль/л, а равновесная концентрация брома в сероуглероде – 4.063 моль/л (при 25 °С). Определить коэффициент распределения брома для си стемы H 2O/CS2. Сравнить количество выделенного брома (г) методом экстракции из 3 л 1.56∙10–3 М водного раствора 60 мл сероуглерода: а) всем количеством экстрагента; 2) порциями по 20 мл."}, {"section": 3, "id": 53, "text": "Равновесная концентрация этилового спирта в воде составляет 0.252 моль/л, а в диэтиловом эфире – 0.356 моль/л (при 25 °С). Определить коэффициент распределения С 2H5ОH для системы вода/диэтиловый эфир. Рассчитать количество этилового спирта, перешедшее в 25 мл диэтилового эфира из 1 л 0.1 М водного раствора спирта."}, {"section": 3, "id": 54, "text": "В 4 л водного раствора находится 0.3 г йода. Какое количество йода останется в водном растворе после экстракции его 60 мл хлороформа: а) если экстракцию проводить двумя порциями хлороформа по 30 мл; б) если экстракцию проводить троекратно порциями по 20 мл э кстрагента? Коэффициент распределения йода для системы вода/хлороформ составляет 7,41·10–3."}, {"section": 3, "id": 55, "text": "Равновесная концентрация этилового спирта в воде составляет 1.477 моль/л, а в четыреххлористом углероде – 0.055 моль/л (при 25°С). Определить коэффициент распре деления С 2H5ОH для системы H 2O/CCl4. Рассчитать количество этилового спирта, перешедшее в 20 мл четыреххлористого углерода из 0.5 л 0.5 М водного раствора спирта."}, {"section": 3, "id": 56, "text": "г синтезированного органического вещества растворено в 1 дм 3 воды. Вычислите массу этого соединения, экстрагируемого 45 см3 бензолом за один раз, и за три раза, но по 15 см 3. Коэффициент распределения вещества между бензолом и водой при комнатной температуре равен 7.4."}, {"section": 3, "id": 57, "text": "Равновесная концентрация бензойной кислоты в водном растворе при 10°С составляет 9·10–4 моль/л, а концентрация ее в диэтиловом эфире – 51 0.064 моль/л. Рассчитать коэффициент распределения для бензойной кислоты между водой и диэтиловым эфиром. Определить какое количество экстракций необходимо провести для 0.03 г бензойной кислоты в 400 мл водного раствора порциями по 5 мл диэтилового эфира, чтобы в воде осталось 1% кислоты от первоначального содержания."}, {"section": 3, "id": 58, "text": "Сколько воды потребуется для извлечения уксусной кислоты из 500 мл 0.1 М раствора уксусной кислоты в амиловом спирте, если ее концентрация в водном растворе должна быть доведена до 0.05 моль/л? Коэффициент распределения уксусной кислоты между амиловым спиртом и водой равен 0.914."}, {"section": 3, "id": 59, "text": "Бензольный раствор, содержащий 0.5 г/л Hg 2Cl2, экстрагируется водой порциями по 20 мл. Сколь ко раз необходимо проводить экстракцию, чтобы остаток соли в исходном растворе составил 1% от первоначального количества, если К = Свода/Сбензол = 0.084?"}, {"section": 3, "id": 60, "text": "При 20 °С коэффициент распределения брома между водой и сероуглеродом К = 0.0125. Какой объем сероу глерода CS 2 необходим для извлечения 90% брома из 5 л 0.05 М водного раствора при однократном экстрагировании?"}, {"section": 3, "id": 61, "text": "Коэффициент распределения йода между водой и сероуглеродом составляет 0.0017. Водный раствор (содержащий 1 кг йода в 1 м 3 воды) интенсивно перемешивают с сероуглеродом. Определить количество йода (в процентах от первоначального содержания), оставшееся в водном растворе, если перемешивать с 0.005 м3 и 0.05 м3 сероуглерода последовательно."}, {"section": 3, "id": 62, "text": "0.012 м3 водного раствора с концентрацией 0.015 кмоль/м3 смешали с 0.02 м3 бензола. Коэффициент распределения бромида ртути между водой и бензолом составляет К = Свода/Сбензол = 0.9. Определите, насколько изменилась концентрация бромида ртути в воде при достижении равновесия."}, {"section": 4, "id": 1, "text": "Константа скорости реакции ( CH3CO)2O + H2O ⇄ 2CH3COOH при 15°С равна 0.0455 мин –1. Исходная концентрация уксусного ангидрида ((CH3CO)2O) была равна 0.5 моль/л. Чему была равна скорость реакции в начальный момент времени и когда в реакционной смеси останется 0.2 моль/л уксусного ангидрида?"}, {"section": 4, "id": 2, "text": "Вычислите константу скорости простой реакции 2А + В→ А 2В, если при концентрациях веществ А и В, равных соответственно 0.7 и 0.3 моль/л, ее скорость составила 0.005 моль/(л·мин). Какова скорость реакции в момент времени, когда в реакцию вступит 0.2 моль/л вещества А?"}, {"section": 4, "id": 3, "text": "Реакция оксида азота (II) с кислородом 2 NO + O2 = 2 NO2 является реакцией третьего порядка. Как изменится скорость этой реакции, если молярную концентрацию оксида азота (II) увеличить в 2 раза, а молярную концентрацию кислорода – в 3 раза."}, {"section": 4, "id": 4, "text": "Реакция между веществами A и B выражается уравнением А + 2В = С. Начальная С(А) равна 0.3 моль/л, а С(B) – 0.5 моль/л. Константа скорости реакции равна 0.4 л 2·моль–2·мин–1. Чему будет равна скорость реакции в момент ее начала и по истечении некоторого времени, когда С(А) уменьшится на 0.1 моль?"}, {"section": 4, "id": 5, "text": "В реакции A + B = D начальные концентрации веществ A и B равны, соответственно, 2.3 моль/л и 3.7 моль/л. Реакция первого порядка по веществу А и второго порядка по веществу В. Константа скорости реакции равна 0.65 л2·моль–2·мин–1. Вычислить скорость реакции в начальный момент времени."}, {"section": 4, "id": 6, "text": "Реакция между веществами A и В выражается уравнением 2А+3В=С. Начальная концентрация вещества А равна 3.2 моль/л, вещества В – 1.6 моль/л. Константа скорости реакции 0.75 л3·моль–3·мин–1. Какова скорость реакции в начальный момент времени, если реакция второго порядка и по веществу А и по веществу В."}, {"section": 4, "id": 7, "text": "Константа скорости гидролиза сахарозы при 298K равна 0 .0032 час–1 (гидролиз – реакция первого порядка). Рассчитайте: а) время, за которое гидролизу подвергнется 10% исходного количества сахарозы; б) какая часть сахарозы подвергнется гидролизу через 5 суток; в) период полупревращения сахарозы в данной реакции."}, {"section": 4, "id": 8, "text": "Период полупревращения реакции первого порядка равен 10 минут. За какое время произойдёт уменьшение исходного количества вещест ва в 8 раз?"}, {"section": 4, "id": 9, "text": "В сосуде имеется 0.015 г радона. Период полураспада радона равен 3.82 дня. Какое количество радона (%) останется в сосуде через 12 дней?"}, {"section": 4, "id": 10, "text": "Период полураспада радиоактивного изотопа 90Sr, который попадает в атмосферу при ядерных испытаниях, – 29 лет. Предположим, что организм новорожденного ребенка поглотил 1.00 мг этого изотопа. Сколько стронция останется в организме через: а) 18 лет, б) 70 лет, если считать, что он не выводится из организма?"}, {"section": 4, "id": 11, "text": "Константа скорости рекомбинации ионов H + и ФГ– (фенилглиоксинат) в молекулу НФГ при 298К равна 1011.59 л/( моль·с). Рассчитайте время, в течение которого реакция прошла на 99.999%, если исходные концентрации обоих ионов равны 0.001 моль/л."}, {"section": 4, "id": 12, "text": "Муравьиный альдегид реагирует с перекисью водорода с образованием муравьиной кислот и воды по уравнению HCOH + H2O2 = HCOOH + H2O. Данная реакция бимолекулярная (2 -го порядка). При смешении равных объемов 1М растворов перекиси водорода и муравьиного альдегида через 2 ч при 60 °С концентрация муравьиной кислоты с тановится равной 0 .215 моль/л. Вычислите константу скорости реакции и период полупревращения."}, {"section": 4, "id": 13, "text": "Константа скорости реакции омыления этилового эфира уксусной кислоты едким натром при 10 °С равна 2.38 л/(моль∙мин). Какое время потребуется на омыление 80% этилацетата, если смешать при 10°С 1 л 0.04 М раствора этилового эфира уксусной кислоты с 1 л 0.04 М раствора едкого натра? Как изменится время реакции, если исходные растворы будут разбавлены в 10 раз?"}, {"section": 4, "id": 14, "text": "Сколько грамм муравьиной кислоты образуется через 3 ч после начала реакции, если смешать 0.5 л 1 М раствора перекиси с 0.5 л 1 М раствора муравьиного альдегида. Константа скорости реакции при 60 °С равна 0.7544 л/(моль∙ч)."}, {"section": 4, "id": 15, "text": "Константа скорости гидролиза новокаина, используемого в качестве местноанестезирующего средства, при температуре 37 °С равна 0.54 мин –1. Определить, какая массовая доля новокаина разложится за 5 дней хранения при указанной температуре."}, {"section": 4, "id": 16, "text": "Определить константу скорости реакции оседания эритроцитов (СОЭ), используя следующие данные: начальная концентрация эритроцитов в плазме крови 1.00∙1012 л–1, через 30 мин концентрация эритроцитов составила 0.25∙1012 л–1."}, {"section": 4, "id": 17, "text": "При аварии на атомной электростанции в окружающую среду попал радиоактивный изотоп йода 131I, период полураспада которого состав ляет 8 суток. Для предотвращения концентрирования радиоактивного йода в щитовидной железе необходимо людям, находящимся в зоне радиоактивного загрязнения, своевременно давать препараты стабильного (нерадиоактивного) йода. Когда разложится большая часть 131I, эта мера станет уже практически бесполезной. Определите, за какое время этот изотоп распадется на 99%?"}, {"section": 4, "id": 18, "text": "В реакции первого порядка уменьшение исходного вещества на 20% произошло за 15 мин. Рассчитайте период полупревращения для этой реакции."}, {"section": 4, "id": 19, "text": "Константа скорости распада пенициллина при температуре 36 °С равна 6 ⋅10–6 с–1, а при 41 °С она составляет 1 .2⋅10–5 с–1. Вычислите температурный коэффициент реакции."}, {"section": 4, "id": 20, "text": "Во сколько раз увеличится скорость реакции разложения спазмолитина в растворе при увеличении т емпературы на 60 °С? Температурный коэффициент данной реакции равен 2.4."}, {"section": 4, "id": 21, "text": "Вычислите, при какой температуре реакция закончится за 20 мин, если при 20 °С на это требуется 3 ч. Температурный коэффициент скорости реакции принять равным 2."}, {"section": 4, "id": 22, "text": "Реакция при 20 °С протекает за 12 минут 48 секунд. На сколько градусов необходимо повысить температуру системы для завершения этой реакции за 48 секунд (температурный коэффициент равен 2)?"}, {"section": 4, "id": 23, "text": "При увеличении температуры от 10 до 50 °С скорость реакции увеличилась в 16 раз. Определите её температурный коэффициент."}, {"section": 4, "id": 24, "text": "Рассчитайте температурный коэффициент скорости реакции, зная, что с повышением температуры на 70°С скорость возрастает в 128 раз."}, {"section": 4, "id": 25, "text": "Раскручивание двойной спирали ДНК является реакцией первого порядка с энергие й активации 420 кДж/моль. При 37 °С константа скорости этой реакции равна 4.90·10–4 мин–1. Определите константу скорости при 40°С."}, {"section": 4, "id": 26, "text": "Для одной из реакций опытным путем были определены две константы скорости: при 218 °С – 0.00032 мин–1, а при 314 °С – 0.0047 мин–1. Определить значение энергии активации данной реакции и константу скорости при 185°С."}, {"section": 4, "id": 27, "text": "Вычислите энергию активации в указанном интервале температур, если константа скорости разложения оксида азота (V) при 35 °С равна 8.76⋅10–3 мин–1, а при 45°С – 2.99⋅10–2 мин–1."}, {"section": 4, "id": 28, "text": "Опытным путем при 25 и 40 °С определены константы скорости реакции разложения гипохлорита натрия в растворе, равные соответственно 0.0093 ч–1 и 0.0342 ч–1. Вычислить значение константы скорости этой реакции при 50°С."}, {"section": 4, "id": 29, "text": "Константа скорости омыления уксусноэтилового эфира гидроксидом натрия при 9.4 °С равна 2.37 л·моль –1·мин–1, а при 14.4 °С – 3.204 л·моль–1·мин–1. Вычислить, при какой температуре константа скорости будет равна 15 л·моль–1·мин–1."}, {"section": 4, "id": 30, "text": "Константа с корости реакции разложения органической кислоты в водном растворе при 20 °С равна 47.5·10–5 мин–1, а при 40 °С – 576·10–5 мин–1. Определить период полураспада кислоты при 30°С, если разложение кислоты протекает как реакция первого порядка."}, {"section": 4, "id": 31, "text": "Денатурация вируса – реакция первого порядка с энергией активации 630 кДж/моль. Период полупревращения при 30 °С равен 5 ч. Рассчитайте период полупревращения при 37°С."}, {"section": 5, "id": 1, "text": "Сравните поверхностную активнос ть метилпропанола и метилбутанола в водных растворах. С, моль/л σ, мН/м Метилпропанол Метилбутанол 0.125 52.8 47.6 0.250 44.1 23.7 Выполняется ли правило Дюкло-Траубе?"}, {"section": 5, "id": 2, "text": "Сравните поверхностную активность пропионовой и масляной кислот в данном интервале концентраций: С, моль/л σ, мН/м Пропионовая кислота Масляная кислота 0.0312 69.5 65.8 0.0625 67.7 60."}, {"section": 5, "id": 3, "text": "С увеличением концентрации раствора изомасляной кислоты с 0.125 моль/л до 0.25 моль/л его поверхностное натяжение снизилось с 55.1 мН/м до 47.9 мН/м, а у раствора изовалериановой кислоты – с 43.2 мН/м до 35.0 мН/м. Сравните величины адсорбции веществ в данном интервале концентрации при Т = 293К."}, {"section": 5, "id": 4, "text": "Найти поверхностный избыток пеларгоновой кислоты С 8Н17СООН при 10°С для концентрации раствора 50 мг/л. Поверхностное натяжение воды при данной температуре 74.22·10–3 Н/м, а раствора указанной концентрации – 57.0·10–3 Н/м."}, {"section": 5, "id": 5, "text": "Определите поверхностный избыток для 20% -ного раствора серной кислоты при 18 °С, если поверхностное натяжение раствора равно 75.2 ∙10–3 Н/м, а воды – 73.05∙10–3 Н/м. Плотность 20% -ного раствора серной кислоты 1.143 г/см3."}, {"section": 5, "id": 6, "text": "Определите поверхностный избыток для водных растворов фенола при 20°С на основании приведённых величин поверхностного натяжения: С (С6Н5ОН), моль/л 0.0156 0.0625 σ, Н/м 58.2∙10–3 43.3∙10–3 σ Н2О при 20°С, Н/м 72.75∙10–3"}, {"section": 5, "id": 7, "text": "Определить поверхностный избыток и знак его для 20%-ного раствора едкого натра при 20 °С, если поверхностное натяжение этого раствора равно 85.8∙10–3 Н/м. Поверхностное натяжение воды при этой температуре равно 72.75∙10–3 Н/м. Плотность 20%-ного раствора едкого натра 1.219 г/см3."}, {"section": 5, "id": 8, "text": "Определить поверхностный избыток для водных растворов изовалериановой кислоты при 15°С, пользуясь следующими данными: С кислоты, моль/л 0.0250 0.0312 σ, Н/м 57.5∙10–3 35.0∙10–3 σ Н2О при 20°С, Н/м 73.49∙10–"}, {"section": 5, "id": 9, "text": "Определите поверхностный избыток и знак его при 15°С для водного раствора, содержащего 29 г/л ацетона, если поверхностное натяжение раствора 59.4∙10–3 Н/м. Поверхностное натяжение воды при этой температуре равно 73.49∙10–3 Н/м."}, {"section": 5, "id": 10, "text": "Площадь поперечного сечения молекулы олеата натрия составляет 2.8·10–19 м2. Вычислите объем раствора 5 г вещества в 1 л бензола, требуемый для покрытия монослоем (после испарения бензола) 2 м2 водной поверхности."}, {"section": 5, "id": 11, "text": "Рассчитайте величину предельной адсорбции жирных кислот, если известно, что площадь поверхностного слоя, приходящаяся на одну молекулу для всего гомологического ряда, составляет 2.05·10–19 м2."}, {"section": 5, "id": 12, "text": "Величина предельной адсорбции высших предельных спиртов составляет 7.69·10 –6 моль/м2. Определите длину молекулы пропанола и бутанола. Какова площадь поперечного сечения молекулы спиртов этого ряда? Плотность пропанола и бутанола равна соответственно 0.804 и 0.809 г/мл."}, {"section": 5, "id": 13, "text": "Для адсорбции уксусной кислоты на адсорбенте ко нстанты уравнения Фрейндлиха равны: а = 0.50 моль/г, n = 0.45. Рассчитайте величину адсорбции при равновесной концентрации 0.22 моль/л."}, {"section": 5, "id": 14, "text": "По уравнению Фрейндлиха вычислить равновесную концентрацию уксусной кислоты, если 1 г угля адсорбирует 3.76 ммоль ук сусной кислоты. Константы а = 2.82 ммоль/г; n = 2."}, {"section": 5, "id": 15, "text": "При изучении адсорбции ацетона древесным активированным углем при 20°С были получены следующие данные: С (С3H6O), ммоль/л 2.34 14.65 88.62 177.69 268.97 A, моль/г 0.208 0.618 1.500 2.080 2.880 Графически определить постоянные а и n уравнения изотермы Фрейндлиха."}, {"section": 5, "id": 16, "text": "Определите графически константы а и n в уравнении изотермы адсорбции Фрейндлиха, если: С, ммоль/мл 0.268 0.471 0.882 А, моль/г 1.55 2.04 2.48"}, {"section": 5, "id": 17, "text": "Определите графически константы а и n в уравнении изотермы адсорбции Фрейндлиха, если: С, ммоль/мл 0.018 0.031 0.062 0.126 А, моль/г 0.467 0.624 0.801 1.110"}, {"section": 5, "id": 18, "text": "Константы уравнения изотермы адсорбции Фрейндлиха равны а = 0.012 моль/г и n = 2. Найд     let ticketNumber = 1;
    let currentTicket = { questions: [], tasks: [] };

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(window.__tt);
      window.__tt = setTimeout(() => t.classList.remove('show'), 1300);
    }

    function sampleUnique(arr, count) {
      const copy = [...arr];
      const out = [];
      while (copy.length && out.length < count) {
        const i = Math.floor(Math.random() * copy.length);
        out.push(copy.splice(i, 1)[0]);
      }
      return out;
    }

    function getTaskPool() {
      const chapter = document.getElementById('chapterFilter').value;
      const filtered = chapter === 'all' ? tasks : tasks.filter(t => String(t.section) === chapter);
      return filtered.length >= 2 ? filtered : tasks;
    }

    function formatTicket() {
      const lines = [
        `БИЛЕТ № ${ticketNumber}`,
        '',
        'Вопросы:',
        ...currentTicket.questions.map((q, i) => `${i + 1}. [${q.id}] ${q.text}`),
        '',
        'Задачи:',
        ...currentTicket.tasks.map((t, i) => `${i + 1}. [${sectionNames[t.section]} · №${t.id}] ${t.text}`)
      ];
      return lines.join('\n');
    }

    function taskImagesHtml(task) {
      const key = `${task.section}-${task.id}`;
      const imgs = taskImageMap[key] || [];
      if (!imgs.length) {
        return `<div class="text">${task.text}</div>`;
      }
      return imgs.map(src => `
        <div class="task-image-wrap">
          <img class="task-image" src="${src}" alt="Задача №${task.id}">
        </div>
      `).join('');
    }

    function renderTicket() {
      document.getElementById('ticketNumber').textContent = `№ ${ticketNumber}`;

      document.getElementById('questionCards').innerHTML = currentTicket.questions.map((q, i) => `
        <div class="item">
          <div class="meta">№${q.id}</div>
          <div class="text">${q.text}</div>
        </div>
      `).join('');

      document.getElementById('taskCards').innerHTML = currentTicket.tasks.map((t, i) => `
        <div class="item">
          <div class="meta">№${t.id}</div>
          ${taskImagesHtml(t)}
        </div>
      `).join('');

      document.getElementById('printTicket').innerHTML = `
        <h1>Билет № ${ticketNumber}</h1>
        <h2>Вопросы</h2>
        ${currentTicket.questions.map((q, i) => `<div class="print-item">${i + 1}. [${q.id}] ${q.text}</div>`).join('')}
        <h2>Задачи</h2>
        ${currentTicket.tasks.map((t, i) => `<div class="print-item">${i + 1}. [${sectionNames[t.section]} · №${t.id}] ${t.text}</div>`).join('')}
      `;
    }

    function generateTicket() {
      ticketNumber += 1;
      currentTicket = {
        questions: sampleUnique(questions, 2),
        tasks: sampleUnique(getTaskPool(), 2)
      };
      renderTicket();
      toast('Готово');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function copyTicket() {
      try {
        await navigator.clipboard.writeText(formatTicket());
        toast('Скопировано');
      } catch (e) {
        toast('Ошибка');
      }
    }

    function downloadPdf() {
      const oldTitle = document.title;
      document.title = `bilet_${ticketNumber}`;
      window.print();
      setTimeout(() => {
        document.title = oldTitle;
      }, 500);
    }

    function norm(s) {
      return String(s).toLowerCase();
    }

    function renderBank() {
      const q = norm(document.getElementById('searchInput').value.trim());
      const chapter = document.getElementById('bankChapterFilter').value;

      const qFiltered = questions
        .filter(item => !q || norm(item.text + ' ' + item.id).includes(q))
        .slice(0, 120);

      const taskBase = chapter === 'all' ? tasks : tasks.filter(t => String(t.section) === chapter);
      const tFiltered = taskBase
        .filter(item => !q || norm(item.text + ' ' + item.id + ' ' + sectionNames[item.section]).includes(q))
        .slice(0, 120);

      document.getElementById('questionBank').innerHTML = qFiltered.map(item => `
        <div class="item">
          <div class="meta">№${item.id}</div>
          <div class="text">${item.text}</div>
        </div>
      `).join('');

      document.getElementById('taskBank').innerHTML = tFiltered.map(item => `
        <div class="item">
          <div class="meta">№${item.id}</div>
          <div class="text">${item.text}</div>
        </div>
      `).join('');
    }

    currentTicket = {
      questions: sampleUnique(questions, 2),
      tasks: sampleUnique(tasks, 2)
    };
    renderTicket();
    renderBank();
  </script>
</body>
</html>
